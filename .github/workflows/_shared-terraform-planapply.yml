# ══════════════════════════════════════════════════════════════════════════════
# _shared-terraform-planapply.yml  –  Shared Reusable Workflow: Terraform Plan & Apply
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Reusable workflow (workflow_call only) that executes the full Terraform
#   lifecycle split across two jobs:
#     plan  — init, fmt-check, validate, plan, PR comment
#     apply — init, fresh plan, apply
#
#   The apply job re-plans immediately before applying to guarantee a fresh
#   state snapshot, eliminating stale-plan errors caused by concurrent runs.
#
# Callers:
#   Infra-Provision-Development.yml  →  environment: development
#   Infra-Provision-Staging.yml      →  environment: staging
#   Infra-Provision-Production.yml   →  environment: production
#   Infra-Provision-Manual.yml       →  manual dispatch (any environment)
#
# Inputs:
#   environment              (required) GitHub environment name; gates approvals
#   working_directory        (optional) Path to Terraform root  [infra/development]
#   tf_version               (optional) Terraform CLI version    [1.8.0]
#   destroy                  (optional) Run terraform destroy instead of apply
#   tf_state_storage_account (required) Azure Storage account for remote state
#   tf_state_container       (required) Blob container name
#   tf_state_key             (required) Blob path/key for the state file
#   apply_branch             (optional) Branch on which apply is permitted
#
# Secrets (passed from caller):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
#   PG_ADMIN_PASSWORD — injected as TF_VAR_pg_admin_password
#
# Apply conditions:
#   Apply only runs when:
#     1. The event is a push to apply_branch (not a PR)
#     2. The plan job detected changes (exit code 2)
#
# State locking:
#   Azure Blob Storage uses lease-based locking. -lock-timeout=5m on both
#   plan and apply waits for any legitimate lock to clear rather than
#   breaking it. The caller's concurrency group prevents concurrent runs.
# ══════════════════════════════════════════════════════════════════════════════

name: _Shared – Terraform (Plan & Apply)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: false
        type: string
        default: infra/development
      tf_version:
        required: false
        type: string
        default: "1.8.0"
      destroy:
        required: false
        type: boolean
        default: false
      tf_state_storage_account:
        required: true
        type: string
      tf_state_container:
        required: true
        type: string
      tf_state_key:
        required: true
        type: string
      apply_branch:
        required: false
        type: string
        default: development
        description: "Branch on which terraform apply is permitted (push events only)"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      PG_ADMIN_PASSWORD:
        required: true
        description: "PostgreSQL admin password (stored as TF_VAR_pg_admin_password)"

jobs:
  # ── Job 1: Plan ───────────────────────────────────────────────────────────
  # Runs on every trigger. Posts plan output to PRs; apply re-plans independently.
  plan:
    name: Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    outputs:
      plan_exit_code: ${{ steps.plan.outputs.exitcode }}

    env:
      ARM_CLIENT_ID:             ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:             ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:              "true"
      TF_VAR_pg_admin_password:  ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_STATE_STORAGE_ACCOUNT:  ${{ inputs.tf_state_storage_account }}
      TF_STATE_CONTAINER:        ${{ inputs.tf_state_container }}
      TF_STATE_KEY:              ${{ inputs.tf_state_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="use_oidc=true"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = changes pending.
      # continue-on-error lets exit code 2 fall through; Fail step below catches 1.
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -detailed-exitcode \
            -lock-timeout=5m \
            ${{ inputs.destroy && '-destroy' || '' }}
        continue-on-error: true

      # Posts the plan as a PR comment so reviewers can inspect changes.
      # Output is capped at 60 000 chars to stay within GitHub's comment limit.
      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const MAX = 60000;
            let plan = `${{ steps.plan.outputs.stdout }}`;
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX) + '\n\n…output truncated (see workflow logs for full plan)';
            }
            const output = `### Terraform Plan – \`${{ inputs.environment }}\`
            \`\`\`
            ${plan}
            \`\`\`
            *Triggered by @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail on Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ── Job 2: Apply ──────────────────────────────────────────────────────────
  # Runs only on branch push when plan detected changes. Re-plans immediately
  # before applying to guarantee a fresh state snapshot — eliminates stale-plan
  # errors that occur when another workflow touches state between plan and apply.
  apply:
    name: Apply (${{ inputs.environment }})
    needs: plan
    if: |
      (github.ref == format('refs/heads/{0}', inputs.apply_branch) ||
       github.event_name == 'workflow_dispatch') &&
      needs.plan.outputs.plan_exit_code == '2'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    env:
      ARM_CLIENT_ID:             ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:             ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:       ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:              "true"
      TF_VAR_pg_admin_password:  ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_STATE_STORAGE_ACCOUNT:  ${{ inputs.tf_state_storage_account }}
      TF_STATE_CONTAINER:        ${{ inputs.tf_state_container }}
      TF_STATE_KEY:              ${{ inputs.tf_state_key }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=$TF_STATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TF_STATE_CONTAINER" \
            -backend-config="key=$TF_STATE_KEY" \
            -backend-config="use_oidc=true"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -lock-timeout=5m \
            ${{ inputs.destroy && '-destroy' || '' }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
