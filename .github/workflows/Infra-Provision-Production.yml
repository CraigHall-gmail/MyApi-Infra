# ══════════════════════════════════════════════════════════════════════════════
# Infra-Provision-Production.yml  –  Infrastructure Provisioning: Production
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Provisions and manages all Azure infrastructure for the production
#   environment using Terraform. Delegates to _shared-terraform-planapply.yml.
#
#   The `production` GitHub Environment must have "Required reviewers" configured
#   in repository settings. This gates the Terraform apply with a manual approval
#   step — no additional workflow logic is required.
#
# Triggers:
#   • workflow_dispatch only — must be triggered manually from the Actions tab.
#
# Required GitHub environment secrets (environment: production):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
# ══════════════════════════════════════════════════════════════════════════════

name: Infra - Provision - Production

on:
  workflow_dispatch:

concurrency:
  group: terraform-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # Checks whether the ACA runner job exists yet. On first provision it won't,
  # so plan/apply fall back to ubuntu-latest. After the first successful apply
  # the runner exists and subsequent runs use it as a self-hosted runner.
  setup:
    name: Check Runner
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    outputs:
      runner:             ${{ steps.check.outputs.runner }}
      runner_aca_job_name: ${{ steps.check.outputs.runner_aca_job_name }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and start ACA runner
        id: check
        run: |
          if az containerapp job show \
               --name job-runner-prd \
               --resource-group rg-myapi-production \
               --output none 2>/dev/null; then
            az containerapp job start \
              --name job-runner-prd \
              --resource-group rg-myapi-production
            echo 'runner=["self-hosted","azure","prd"]' >> "$GITHUB_OUTPUT"
            echo 'runner_aca_job_name=job-runner-prd'  >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"'  >> "$GITHUB_OUTPUT"
            echo 'runner_aca_job_name='    >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: setup
    uses: ./.github/workflows/_shared-terraform-planapply.yml
    with:
      environment:               production
      working_directory:         production
      tf_version:                "1.8.0"
      destroy:                   false
      tf_state_storage_account:  myapiterraformstate
      tf_state_container:        tfstate
      tf_state_key:              production/api.tfstate
      apply_branch:              main
      runner:                    ${{ needs.setup.outputs.runner }}
      runner_aca_job_name:       ${{ needs.setup.outputs.runner_aca_job_name }}
      runner_resource_group:     rg-myapi-production
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PG_ADMIN_PASSWORD:     ${{ secrets.PG_ADMIN_PASSWORD }}
      GH_RUNNER_PAT:         ${{ secrets.GH_RUNNER_PAT }}
      GH_RUNNER_APP_PAT:     ${{ secrets.GH_RUNNER_APP_PAT }}
