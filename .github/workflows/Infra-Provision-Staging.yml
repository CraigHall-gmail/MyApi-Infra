# ══════════════════════════════════════════════════════════════════════════════
# Infra-Provision-Staging.yml  –  Infrastructure Provisioning: Staging
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Provisions and manages all Azure infrastructure for the staging environment
#   using Terraform. Delegates to _shared-terraform-planapply.yml which handles
#   init, plan, and apply.
#
# Triggers:
#   • workflow_dispatch only — must be triggered manually from the Actions tab.
#
# Plan vs Apply:
#   • pull_request  → plan output posted as a PR comment; no apply
#   • push/dispatch → plan + auto-approve apply (only if changes detected)
#
# Required GitHub environment secrets (environment: staging):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
# ══════════════════════════════════════════════════════════════════════════════

name: Infra - Provision - Staging

on:
  workflow_dispatch:

concurrency:
  group: terraform-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  start-runner:
    name: Start Staging Runner
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start ACA runner job
        run: az containerapp job start --name job-runner-stg --resource-group rg-myapi-staging

  deploy:
    needs: start-runner
    uses: ./.github/workflows/_shared-terraform-planapply.yml
    with:
      environment:               staging
      working_directory:         staging
      tf_version:                "1.8.0"
      destroy:                   false
      tf_state_storage_account:  myapiterraformstate
      tf_state_container:        tfstate
      tf_state_key:              staging/api.tfstate
      apply_branch:              main
      runner:                    '["self-hosted","azure","stg"]'
      runner_aca_job_name:       job-runner-stg
      runner_resource_group:     rg-myapi-staging
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PG_ADMIN_PASSWORD:     ${{ secrets.PG_ADMIN_PASSWORD }}
      GH_RUNNER_PAT:         ${{ secrets.GH_RUNNER_PAT }}
      GH_RUNNER_APP_PAT:     ${{ secrets.GH_RUNNER_APP_PAT }}
