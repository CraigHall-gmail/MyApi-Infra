# ══════════════════════════════════════════════════════════════════════════════
# Infra-Drift-Scheduled.yml  –  Nightly Infrastructure Drift Check (all environments)
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Runs a nightly Terraform plan against all three environments in parallel to
#   detect drift — changes made directly to Azure outside of Terraform that are
#   no longer in sync with the Terraform state.
#
# Triggers:
#   • schedule        – 01:00 UTC every night
#   • workflow_dispatch – manual on-demand drift check
#
# Alerting:
#   Drift detected  (plan exit code 2) → creates a GitHub Issue labelled
#                   'infrastructure-drift-<env>'. Adds a comment to any
#                   existing open issue instead of opening a duplicate.
#   Plan error      (plan exit code 1) → creates/updates a GitHub Issue
#   No drift        (plan exit code 0) → closes any open drift issues
#
# This workflow is plan-only — it never applies changes.
#
# GitHub Environments:
#   development     → matrix entry: development
#   environments-drift → matrix entries: staging, production
#
# Required secrets (per GitHub Environment):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
# ══════════════════════════════════════════════════════════════════════════════

name: Infra - Drift (Scheduled)

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC every night
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  drift-check:
    name: Drift Check (${{ matrix.env_name }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.gh_environment }}
    concurrency:
      group: drift-check-${{ matrix.env_name }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name:       development
            gh_environment: development
            infra_dir:      infra/development
            tfstate_key:    development/api.tfstate
          - env_name:       staging
            gh_environment: environments-drift
            infra_dir:      infra/staging
            tfstate_key:    staging/api.tfstate
          - env_name:       production
            gh_environment: environments-drift
            infra_dir:      infra/production
            tfstate_key:    production/api.tfstate

    defaults:
      run:
        working-directory: ${{ matrix.infra_dir }}

    env:
      ARM_CLIENT_ID:            ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:            ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:      ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:             "true"
      TF_VAR_pg_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=myapiterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ matrix.tfstate_key }}" \
            -backend-config="use_oidc=true"

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = drift detected.
      # continue-on-error so the alert step always runs regardless of exit code.
      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -detailed-exitcode \
            -lock-timeout=2m
        continue-on-error: true

      # Creates, updates, or closes a GitHub Issue depending on the plan result.
      # Uses a per-environment label so issues are tracked independently.
      - name: Manage drift issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const ENV      = '${{ matrix.env_name }}';
            const LABEL    = `infrastructure-drift-${ENV}`;
            const exitcode = '${{ steps.plan.outputs.exitcode }}';
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const now      = new Date().toISOString();

            // Ensure the label exists — safe to call if it already does.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  LABEL,
                color: 'd93f0b',
                description: `Azure ${ENV} infrastructure has drifted from Terraform state`
              });
            } catch (_) {}

            // Find any open drift issues from previous runs for this environment.
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              labels: LABEL,
              state:  'open'
            });

            const MAX = 60000;
            let planOut = `${{ steps.plan.outputs.stdout }}`;
            if (planOut.length > MAX) {
              planOut = planOut.slice(0, MAX) + '\n\n…output truncated — see full run logs';
            }

            if (exitcode === '2') {
              // ── Drift detected ────────────────────────────────────────────
              const body = [
                `### ⚠️ Infrastructure Drift Detected — \`${ENV}\``,
                ``,
                `Terraform found changes between the state file and the actual Azure infrastructure.`,
                `Investigate whether these were intentional and either apply or revert them.`,
                ``,
                `**Workflow run:** ${runUrl}`,
                `**Detected at:** ${now}`,
                ``,
                `\`\`\``,
                planOut,
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                // Drift is ongoing — add a comment to the existing issue.
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: [
                    `### Drift still present — ${now}`,
                    ``,
                    `**Workflow run:** ${runUrl}`,
                    ``,
                    `\`\`\``,
                    planOut,
                    `\`\`\``
                  ].join('\n')
                });
                console.log(`Updated existing drift issue #${openIssues[0].number}`);
              } else {
                // First detection — open a new issue.
                const { data: issue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  `⚠️ Infrastructure Drift Detected — ${ENV}`,
                  body:   body,
                  labels: [LABEL]
                });
                console.log(`Opened drift issue #${issue.number}`);
              }

            } else if (exitcode === '1') {
              // ── Plan error ────────────────────────────────────────────────
              const body = [
                `### 🔴 Terraform Plan Error — \`${ENV}\``,
                ``,
                `The nightly drift check failed to produce a plan. Manual investigation required.`,
                ``,
                `**Workflow run:** ${runUrl}`,
                `**Occurred at:** ${now}`,
                ``,
                `\`\`\``,
                planOut || '(no output captured — check the workflow logs)',
                `\`\`\``
              ].join('\n');

              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: `### Plan error — ${now}\n\n**Run:** ${runUrl}\n\n\`\`\`\n${planOut}\n\`\`\``
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner:  context.repo.owner,
                  repo:   context.repo.repo,
                  title:  `🔴 Terraform Plan Error — ${ENV}`,
                  body:   body,
                  labels: [LABEL]
                });
                console.log(`Opened plan error issue #${issue.number}`);
              }
              // Re-throw so the workflow step is marked failed.
              core.setFailed('Terraform plan returned exit code 1');

            } else {
              // ── No drift (exit code 0) ────────────────────────────────────
              console.log('No drift detected.');
              for (const issue of openIssues) {
                await github.rest.issues.createComment({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ No drift detected as of ${now} — closing.\n\n**Workflow run:** ${runUrl}`
                });
                await github.rest.issues.update({
                  owner:        context.repo.owner,
                  repo:         context.repo.repo,
                  issue_number: issue.number,
                  state:        'closed'
                });
                console.log(`Closed resolved drift issue #${issue.number}`);
              }
            }
