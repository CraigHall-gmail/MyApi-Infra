# ══════════════════════════════════════════════════════════════════════════════
# Infra-Drift-Scheduled.yml  –  Nightly Infrastructure Drift Check (all environments)
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Runs a nightly Terraform plan against all three environments in parallel to
#   detect drift — changes made directly to Azure outside of Terraform that are
#   no longer in sync with the Terraform state.
#
# Triggers:
#   • schedule        – 01:00 UTC every night
#   • workflow_dispatch – manual on-demand drift check
#
# Alerting:
#   Drift detected  (plan exit code 2) → creates a GitHub Issue labelled
#                   'infrastructure-drift-<env>'. Adds a comment to any
#                   existing open issue instead of opening a duplicate.
#   Plan error      (plan exit code 1) → creates/updates a GitHub Issue
#   No drift        (plan exit code 0) → closes any open drift issues
#
# This workflow is plan-only — it never applies changes.
#
# Runner strategy:
#   Each environment has a setup job that checks whether an ACA Jobs self-hosted
#   runner exists and starts it if so. The drift job then runs on that runner so
#   it can reach private Key Vault data plane endpoints inside the VNet. Environments
#   without a provisioned runner fall back to ubuntu-latest automatically.
#
# GitHub Environments:
#   development      → setup-dev, drift-development
#   environments-drift → setup-stg, setup-prd, drift-staging, drift-production
#
# Required secrets (per GitHub Environment):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#   PG_ADMIN_PASSWORD, GH_RUNNER_PAT, GH_RUNNER_APP_PAT
# ══════════════════════════════════════════════════════════════════════════════

name: Infra - Drift (Scheduled)

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC every night
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  # ── Setup: check/start ACA runner per environment ─────────────────────────
  # Mirrors the setup-* jobs in Infra-CI.yml. Falls back to ubuntu-latest when
  # no ACA runner is provisioned yet for that environment.

  setup-dev:
    name: Check Dev Runner
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and start ACA runner
        id: check
        run: |
          if az containerapp job show \
               --name job-runner-dev \
               --resource-group rg-myapi-dev \
               --output none 2>/dev/null; then
            az containerapp job start \
              --name job-runner-dev \
              --resource-group rg-myapi-dev
            echo 'runner=["self-hosted","azure","dev"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi

  setup-stg:
    name: Check Staging Runner
    runs-on: ubuntu-latest
    environment: environments-drift
    permissions:
      id-token: write
      contents: read
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and start ACA runner
        id: check
        run: |
          if az containerapp job show \
               --name job-runner-stg \
               --resource-group rg-myapi-staging \
               --output none 2>/dev/null; then
            az containerapp job start \
              --name job-runner-stg \
              --resource-group rg-myapi-staging
            echo 'runner=["self-hosted","azure","stg"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi

  setup-prd:
    name: Check Production Runner
    runs-on: ubuntu-latest
    environment: environments-drift
    permissions:
      id-token: write
      contents: read
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and start ACA runner
        id: check
        run: |
          if az containerapp job show \
               --name job-runner-prd \
               --resource-group rg-myapi-production \
               --output none 2>/dev/null; then
            az containerapp job start \
              --name job-runner-prd \
              --resource-group rg-myapi-production
            echo 'runner=["self-hosted","azure","prd"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi

  # ── Drift checks ───────────────────────────────────────────────────────────
  # Each job runs on the runner resolved by its setup job. When the self-hosted
  # runner is used, it executes inside the VNet and can reach the Key Vault
  # data plane. terraform_wrapper remains enabled so steps.plan.outputs.exitcode
  # and steps.plan.outputs.stdout are available for the issue management script.

  drift-development:
    name: Drift Check (development)
    needs: setup-dev
    runs-on: ${{ fromJSON(needs.setup-dev.outputs.runner) }}
    environment: development
    concurrency:
      group: drift-check-development
      cancel-in-progress: true
    env:
      DRIFT_ENV: development
      ARM_CLIENT_ID:              ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:              ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID:        ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:               "true"
      TF_VAR_pg_admin_password:   ${{ secrets.PG_ADMIN_PASSWORD }}
      TF_VAR_runner_pat:          ${{ secrets.GH_RUNNER_PAT }}
      TF_VAR_runner_app_pat:      ${{ secrets.GH_RUNNER_APP_PAT }}
    defaults:
      run:
        working-directory: development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.8.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=myapiterraformstate" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=development/api.tfstate" \
            -backend-config="use_oidc=true"

      - name: Terraform Plan (drift detection)
        id: plan
        run: |
          set +e
          terraform plan \
            -var-file="terraform.tfvars" \
            -detailed-exitcode \
            -lock-timeout=2m > plan_output.txt 2>&1
          PLAN_EXIT=$?
          cat plan_output.txt
          echo "exitcode=$PLAN_EXIT" >> "$GITHUB_OUTPUT"
          {
            echo 'stdout<<EOF'
            cat plan_output.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Manage drift issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PLAN_EXITCODE: ${{ steps.plan.outputs.exitcode }}
          PLAN_STDOUT:   ${{ steps.plan.outputs.stdout }}
          RUN_URL:       ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DRIFT_ENV:     development
        with:
          script: |
            const ENV      = process.env.DRIFT_ENV;
            const LABEL    = `infrastructure-drift-${ENV}`;
            const exitcode = process.env.PLAN_EXITCODE;
            const runUrl   = process.env.RUN_URL;
            const now      = new Date().toISOString();

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: LABEL, color: 'd93f0b',
                description: `Azure ${ENV} infrastructure has drifted from Terraform state`
              });
            } catch (_) {}

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: LABEL, state: 'open'
            });

            const MAX = 60000;
            let planOut = process.env.PLAN_STDOUT || '';
            if (planOut.length > MAX) planOut = planOut.slice(0, MAX) + '\n\n…output truncated — see full run logs';

            if (exitcode === '2') {
              const body = [
                `### ⚠️ Infrastructure Drift Detected — \`${ENV}\``, ``,
                `Terraform found changes between the state file and the actual Azure infrastructure.`,
                `Investigate whether these were intentional and either apply or revert them.`, ``,
                `**Workflow run:** ${runUrl}`, `**Detected at:** ${now}`, ``,
                `\`\`\``, planOut, `\`\`\``
              ].join('\n');
              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: [`### Drift still present — ${now}`, ``, `**Workflow run:** ${runUrl}`, ``, `\`\`\``, planOut, `\`\`\``].join('\n')
                });
                console.log(`Updated existing drift issue #${openIssues[0].number}`);
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `⚠️ Infrastructure Drift Detected — ${ENV}`, body, labels: [LABEL]
                });
                console.log(`Opened drift issue #${issue.number}`);
              }
            } else if (exitcode === '1') {
              const body = [
                `### 🔴 Terraform Plan Error — \`${ENV}\``, ``,
                `The nightly drift check failed to produce a plan. Manual investigation required.`, ``,
                `**Workflow run:** ${runUrl}`, `**Occurred at:** ${now}`, ``,
                `\`\`\``, planOut || '(no output captured — check the workflow logs)', `\`\`\``
              ].join('\n');
              if (openIssues.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: openIssues[0].number,
                  body: `### Plan error — ${now}\n\n**Run:** ${runUrl}\n\n\`\`\`\n${planOut}\n\`\`\``
                });
              } else {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `🔴 Terraform Plan Error — ${ENV}`, body, labels: [LABEL]
                });
                console.log(`Opened plan error issue #${issue.number}`);
              }
              core.setFailed('Terraform plan returned exit code 1');
            } else {
              console.log('No drift detected.');
              for (const issue of openIssues) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ No drift detected as of ${now} — closing.\n\n**Workflow run:** ${runUrl}`
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: 'closed'
                });
                console.log(`Closed resolved drift issue #${issue.number}`);
              }
            }

