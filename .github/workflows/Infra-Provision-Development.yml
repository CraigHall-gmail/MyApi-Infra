# ══════════════════════════════════════════════════════════════════════════════
# Infra-Provision-Development.yml  –  Infrastructure Provisioning: Development
# ══════════════════════════════════════════════════════════════════════════════
#
# Purpose:
#   Provisions and manages all Azure infrastructure for the development
#   environment using Terraform. Delegates to _shared-terraform-planapply.yml
#   which handles init, plan, and apply.
#
# Triggers:
#   • workflow_dispatch only — must be triggered manually from the Actions tab.
#
# Separation from CI/CD:
#   App-CI.yml excludes infrastructure paths via paths-ignore, and this
#   workflow targets development/** via paths. The two pipelines never overlap.
#
# Concurrency:
#   One Terraform run per environment at a time. cancel-in-progress: false
#   queues rather than cancels to prevent state corruption from partial applies.
#
# Terraform state:
#   Stored in Azure Blob Storage:
#     Storage account : myapiterraformstate
#     Container       : tfstate
#     Blob key        : development/api.tfstate
#   OIDC authentication is used — no storage account keys are stored as secrets.
#
# Plan vs Apply:
#   • pull_request  → plan output posted as a PR comment; no apply
#   • push/dispatch → plan + auto-approve apply (only if changes detected)
#
# Required GitHub environment secrets (environment: development):
#   AZURE_CLIENT_ID       – App Registration client ID for OIDC federation
#   AZURE_TENANT_ID       – Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID – Target Azure subscription ID
#
# Destroy:
#   Use Infra-Provision-Manual.yml with destroy: true. Not automated — requires
#   an explicit manual trigger to prevent accidental infrastructure deletion.
# ══════════════════════════════════════════════════════════════════════════════

name: Infra - Provision - Development

on:
  workflow_dispatch:

# Serialises Terraform runs per environment to prevent concurrent state modifications.
concurrency:
  group: terraform-development
  cancel-in-progress: false

permissions:
  id-token: write        # OIDC token for Azure login
  contents: read
  pull-requests: write   # post plan output as PR comment

jobs:
  # Checks whether the ACA runner job exists yet. On first provision it won't,
  # so plan/apply fall back to ubuntu-latest. After the first successful apply
  # the runner exists and subsequent runs use it as a self-hosted runner.
  setup:
    name: Check Runner
    runs-on: ubuntu-latest
    environment: development
    permissions:
      id-token: write
      contents: read
    outputs:
      runner:              ${{ steps.check.outputs.runner }}
      runner_aca_job_name: ${{ steps.check.outputs.runner_aca_job_name }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and start ACA runner
        id: check
        run: |
          if az containerapp job show \
               --name job-runner-dev \
               --resource-group rg-myapi-dev \
               --output none 2>/dev/null; then
            az containerapp job start \
              --name job-runner-dev \
              --resource-group rg-myapi-dev
            echo 'runner=["self-hosted","azure","dev"]' >> "$GITHUB_OUTPUT"
            echo 'runner_aca_job_name=job-runner-dev'  >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"'  >> "$GITHUB_OUTPUT"
            echo 'runner_aca_job_name='    >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: setup
    uses: ./.github/workflows/_shared-terraform-planapply.yml
    with:
      environment:               development
      working_directory:         development
      tf_version:                "1.8.0"
      destroy:                   false
      tf_state_storage_account:  myapiterraformstate
      tf_state_container:        tfstate
      tf_state_key:              development/api.tfstate
      runner:                    ${{ needs.setup.outputs.runner }}
      runner_aca_job_name:       ${{ needs.setup.outputs.runner_aca_job_name }}
      runner_resource_group:     rg-myapi-dev
    secrets:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      PG_ADMIN_PASSWORD:     ${{ secrets.PG_ADMIN_PASSWORD }}
      GH_RUNNER_PAT:         ${{ secrets.GH_RUNNER_PAT }}
      GH_RUNNER_APP_PAT:     ${{ secrets.GH_RUNNER_APP_PAT }}
