# ══════════════════════════════════════════════════════════════════════════════
# sonar-project.properties  –  SonarCloud project configuration
# ══════════════════════════════════════════════════════════════════════════════
#
# Used by SonarSource/sonarqube-scan-action in Infra-CI.yml.
# The generic SonarScanner CLI reads this file — no build tool required.
#
# Required secret: SONAR_TOKEN_INFRA (repository secret in GitHub)
# ══════════════════════════════════════════════════════════════════════════════

sonar.projectKey=CraigHall-gmail_MyApi_Infra
sonar.organization=craighall-gmail
sonar.projectName=MyApi Infrastructure

# Terraform source directories — all environments and shared modules
sonar.sources=development,staging,production,modules

# Exclude Terraform provider cache, state files, lock files, and bootstrap scripts.
sonar.exclusions=\
  **/.terraform/**,\
  **/*.tfstate,\
  **/*.tfstate.backup,\
  **/.terraform.lock.hcl,\
  bootstrap/**

sonar.scm.provider=git
